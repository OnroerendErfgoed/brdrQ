name: QGIS Plugin CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "plugin/brdrq/**"
      - ".github/workflows/qgis-ci.yml"
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: qgis3
            image: ghcr.io/qgis/qgis:release-3_44
          - name: qgis4
            image: ghcr.io/qgis/qgis-qt6-unstable:main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests in QGIS container
        run: |
          set -euxo pipefail
          IMAGE="${{ matrix.image }}"
          docker pull "$IMAGE"
          docker run --rm --platform linux/amd64 \
            -e QT_QPA_PLATFORM=offscreen \
            -e PYTHONDONTWRITEBYTECODE=1 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "$IMAGE" \
            /bin/bash -lc '
              set -euxo pipefail
              python3 -m ensurepip --upgrade || true
              python3 -m pip install --upgrade pip
              python3 -m pip install --upgrade pytest brdr==0.15.6 || \
                python3 -m pip install --break-system-packages --upgrade pytest brdr==0.15.6
              TESTS="plugin/brdrq/test/test_init.py \
                     plugin/brdrq/test/test_toolbar.py \
                     plugin/brdrq/test/test_utils.py \
                     plugin/brdrq/test/test_brdrqdockwidgetfeaturealigner.py"
              if command -v xvfb-run >/dev/null 2>&1; then
                xvfb-run -a python3 -m pytest -q $TESTS
              else
                python3 -m pytest -q $TESTS
              fi
            '
